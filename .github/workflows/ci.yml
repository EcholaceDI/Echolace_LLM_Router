name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 07_Production_Applications/Echolace_LLM_Router
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: python -m flake8 llm_router/paths.py llm_router/healing/planner.py tests/test_paths.py tests/test_healing_planner.py
      - name: Unit tests
        run: python -m pytest tests
      - name: Build
        run: python -m build
